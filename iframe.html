<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feelform Widget</title>
  <style>
    :root { --bg:#f7fbfb; --card:#fff; --muted:#555; --accent:#0b74de; }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    #app{height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:18px}
    .card{width:100%;max-width:720px;padding:18px;border-radius:12px;background:var(--card);box-shadow:0 6px 18px rgba(0,0,0,0.06);text-align:left}
    h3{margin:0 0 8px 0;font-size:18px}
    p{margin:0 0 12px 0;color:var(--muted)}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    button{padding:8px 12px;border-radius:8px;border:1px solid rgba(0,0,0,0.06);background:var(--accent);color:#fff;cursor:pointer}
    .secondary{background:#eee;color:#111;border:1px solid #ddd}
    small{display:block;margin-top:10px;color:#888}

    /* Consent modal + privacy link + undo CTA */
    #feelform-consent-root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; }
    .ff-modal-backdrop { position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:9999 }
    .ff-modal { width:100%;max-width:520px;background:#fff;border-radius:12px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,0.12); }
    .ff-title { margin:0 0 8px 0;font-size:18px;color:#111 }
    .ff-body { margin:0 0 14px 0;color:#444;line-height:1.35 }
    .ff-actions { display:flex;gap:8px;justify-content:flex-end }
    .ff-btn { padding:8px 12px;border-radius:8px;border:1px solid #e6e6e6;background:#0b74de;color:#fff;cursor:pointer }
    .ff-btn.secondary { background:#f3f4f6;color:#111;border:1px solid #ddd }
    .ff-privacy { position:fixed; right:16px; bottom:16px; z-index:9998; background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #eee;box-shadow:0 6px 18px rgba(0,0,0,0.06); cursor:pointer }
    .ff-undo { position:fixed; left:50%; transform:translateX(-50%); bottom:24px; z-index:9999; background:#111;color:#fff;padding:10px 16px;border-radius:999px;box-shadow:0 8px 24px rgba(0,0,0,0.18); display:none; align-items:center; gap:10px }
    .ff-undo button { background:transparent;border:0;color:#fff;font-weight:600;cursor:pointer }
    .ff-rationale { font-size:13px;color:#666;margin-top:10px }
    .ff-link { color:#0b74de;text-decoration:underline; cursor:pointer }
  </style>
</head>
<body>
  <div id="app">
    <div class="card" id="feelform-card" role="region" aria-label="Feelform widget">
      <h3>Feelform</h3>
      <p id="status">Initializing widget…</p>

      <div class="controls" id="controls" aria-hidden="true" style="display:none">
        <button id="consentMic">Enable Mic (optional)</button>
        <button id="consentKeyboard" class="secondary">Enable Keyboard (optional)</button>
        <button id="close" class="secondary">Close</button>
      </div>

      <small id="rationale" aria-live="polite"></small>
    </div>
  </div>

  <!-- Consent modal + privacy link + undo CTA -->
  <div id="feelform-consent-root" aria-hidden="false">
    <div id="ffModal" class="ff-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="ffTitle" style="display:none">
      <div class="ff-modal" role="document">
        <h3 id="ffTitle" class="ff-title">Feelform — Privacy first</h3>
        <p class="ff-body">Feelform runs locally in your browser. We only use sensors you explicitly enable. No audio or keystroke data leaves your device unless you opt in.</p>
        <div class="ff-actions">
          <button id="ffSkip" class="ff-btn secondary">Skip</button>
          <button id="ffAllowMic" class="ff-btn">Allow mic (optional)</button>
        </div>
        <div class="ff-rationale" id="ffRationale">You can revoke permissions anytime from this widget.</div>
      </div>
    </div>

    <div id="ffPrivacy" class="ff-privacy" role="button" aria-label="Feelform privacy">
      Privacy
    </div>

    <div id="ffUndo" class="ff-undo" role="status" aria-live="polite">
      <span id="ffUndoText">Adaptive action applied</span>
      <button id="ffUndoBtn">Undo</button>
    </div>
  </div>

  <script>
    (function(){
      'use strict';

      // Notify parent that widget is ready. Parent will validate origin.
      function sendReady() {
        try {
          parent.postMessage({ type: 'feelform:ready' }, '*');
        } catch (e) {
          console.warn('Feelform: ready postMessage failed', e);
        }
      }

      // Update UI helpers
      const statusEl = document.getElementById('status');
      const controlsEl = document.getElementById('controls');
      const rationaleEl = document.getElementById('rationale');

      function showControls() {
        controlsEl.style.display = 'flex';
        controlsEl.setAttribute('aria-hidden', 'false');
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function setRationale(text) {
        rationaleEl.textContent = text || '';
      }

      // Consent modal elements and logic
      const modal = document.getElementById('ffModal');
      const allowMicBtn = document.getElementById('ffAllowMic');
      const skipBtn = document.getElementById('ffSkip');
      const privacyBtn = document.getElementById('ffPrivacy');
      const undoEl = document.getElementById('ffUndo');
      const undoBtn = document.getElementById('ffUndoBtn');
      const undoText = document.getElementById('ffUndoText');
      const rationale = document.getElementById('ffRationale');

      const CONSENT_KEY = 'feelform_consent_v1';
      const stored = (() => {
        try { return JSON.parse(localStorage.getItem(CONSENT_KEY)); } catch(e){ return null; }
      })();

      function openModal() {
        modal.style.display = 'flex';
        const focusable = modal.querySelector('button');
        if (focusable) focusable.focus();
      }

      function closeModal() {
        modal.style.display = 'none';
      }

      function saveConsent(payload) {
        try { localStorage.setItem(CONSENT_KEY, JSON.stringify(payload)); } catch(e){}
        try { parent.postMessage({ type: 'consent:update', payload }, '*'); } catch(e){}
      }

      if (!stored) {
        openModal();
      } else {
        if (stored.rationale) rationale.textContent = stored.rationale;
      }

      allowMicBtn.addEventListener('click', async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach(t => t.stop());
          const payload = { mic: true, keyboard: false, wearable: false, rationale: 'Mic enabled by user' };
          saveConsent(payload);
          closeModal();
          rationale.textContent = 'Microphone enabled locally.';
        } catch (err) {
          rationale.textContent = 'Microphone permission denied or unavailable.';
        }
      });

      skipBtn.addEventListener('click', () => {
        const payload = { mic: false, keyboard: false, wearable: false, rationale: 'User skipped' };
        saveConsent(payload);
        closeModal();
        rationale.textContent = 'Sensors disabled by default.';
      });

      privacyBtn.addEventListener('click', () => {
        if (modal.style.display === 'flex') return;
        modal.style.display = 'flex';
        modal.querySelector('.ff-title').textContent = 'How Feelform uses data';
        modal.querySelector('.ff-body').innerHTML =
          '<strong>Local processing by default.</strong> Inference runs in your browser.<br><strong>Explicit opt-in for sensors.</strong> Mic and keyboard require permission.<br><strong>Minimal retention.</strong> Only short labels and summaries are stored unless you enable raw logs.<br><span class="ff-link" id="ffPrivacyClose">Close</span>';
        document.getElementById('ffPrivacyClose').addEventListener('click', () => {
          modal.style.display = 'none';
          modal.querySelector('.ff-title').textContent = 'Feelform — Privacy first';
          modal.querySelector('.ff-body').textContent = 'Feelform runs locally in your browser. We only use sensors you explicitly enable. No audio or keystroke data leaves your device unless you opt in.';
        }, { once: true });
      });

      // Undo CTA API
      let undoTimer = null;
      window.feelformShowUndo = function(message, undoCallback) {
        undoText.textContent = message || 'Adaptive action applied';
        undoEl.style.display = 'flex';
        undoBtn.onclick = function() {
          try { undoCallback && undoCallback(); } catch(e){}
          hideUndo();
        };
        if (undoTimer) clearTimeout(undoTimer);
        undoTimer = setTimeout(hideUndo, 8000);
      };

      function hideUndo() {
        undoEl.style.display = 'none';
        undoBtn.onclick = null;
        if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
      }

      window.feelformGetConsent = function() {
        try { return JSON.parse(localStorage.getItem(CONSENT_KEY)); } catch(e){ return null; }
      };

      // Handle messages from parent (init, consent:update, etc.)
      function handleMessage(ev) {
        if (!ev || !ev.data || typeof ev.data !== 'object' || typeof ev.data.type !== 'string') return;
        const msg = ev.data;

        switch (msg.type) {
          case 'init':
            setStatus('Widget initialized for ' + (msg.site || 'this site') + '.');
            showControls();
            try { parent.postMessage({ type: 'feelform:inited', timestamp: Date.now() }, ev.origin); } catch (e) {}
            break;

          case 'consent:update':
            const payload = msg.payload || {};
            setStatus('Consent updated.');
            setRationale('Mic: ' + (!!payload.mic) + ' · Keyboard: ' + (!!payload.keyboard) + ' · Wearable: ' + (!!payload.wearable));
            break;

          case 'consent:status':
            try { parent.postMessage({ type: 'consent:status', payload: { mic: false, keyboard: false, wearable: false } }, ev.origin); } catch (e) {}
            break;

          default:
            break;
        }
      }

      document.getElementById('consentMic').addEventListener('click', async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach(t => t.stop());
          setStatus('Microphone permission granted (local use only).');
          setRationale('Ambient tone detection enabled.');
          try { parent.postMessage({ type: 'consent:update', payload: { mic: true } }, '*'); } catch (e) {}
        } catch (err) {
          setStatus('Microphone permission denied or unavailable.');
          setRationale('');
        }
      });

      document.getElementById('consentKeyboard').addEventListener('click', () => {
        setStatus('Keyboard sensing consent toggled (host must enable).');
        setRationale('Keystroke dynamics enabled.');
        try { parent.postMessage({ type: 'consent:update', payload: { keyboard: true } }, '*'); } catch (e) {}
      });

      document.getElementById('close').addEventListener('click', () => {
        setStatus('Widget closed by user.');
        setRationale('');
        try { parent.postMessage({ type: 'widget:closed' }, '*'); } catch (e) {}
      });

      window.addEventListener('message', handleMessage, false);

      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        sendReady();
      } else {
        window.addEventListener('DOMContentLoaded', sendReady, { once: true });
      }

      window.addEventListener('unload', () => {
        window.removeEventListener('message', handleMessage);
        if (undoTimer) clearTimeout(undoTimer);
      }, false);

    })();
  </script>
</body>
</html>
